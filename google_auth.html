<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>AI Talent Intelligence OS - Google Auth</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f8fafc;
            margin: 0;
        }

        .card {
            background: white;
            padding: 48px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
        }

        h2 {
            color: #0f172a;
            margin-bottom: 12px;
        }

        p {
            color: #64748b;
            margin-bottom: 32px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 16px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .note {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 24px;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>🌌 Intelligence OS v8.0</h2>
        <p>구글 드라이브 업로드 권한을 위해<br>아래 버튼을 클릭하여 인증을 진행해 주세요.</p>
        <a class="btn"
            href="https://accounts.google.com/o/oauth2/auth?response_type=code&client_id=408011902412-sihvd5oepl3ollqhnfbns7a5adkdjt9p.apps.googleusercontent.com&redirect_uri=http%3A%2F%2Flocalhost%3A8080%2F&scope=https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fdrive.file+https%3A%2F%2Fwww.googleapis.com%2Fauth%2Fdrive.metadata.readonly&state=VUOROJvzbTMXUx2i8WtQNAzBRWwlId&access_type=offline&prompt=consent">구글
            드라이브 인증 시작하기</a>
        <div class="note">인증 완료 후 "The authentication flow has completed" 메시지가 나오면 창을 닫아주세요.</div>
    </div>
</body>

</html>
